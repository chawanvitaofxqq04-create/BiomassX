    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 10px;

            cursor: pointer;

            display: flex;

        .product-card:hover {
            border-color: #94a3b8;

        }
        .product-card.selected {
            border-color: #22c55e;
            background-color: #f0fdf4;
            box-shadow: 0 0 0 1px #22c55e;
        }
        .product-card-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .product-card-badge {
            align-self: flex-start;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-raw {
            background-color: #ecfdf5;
            color: #059669;
        }
        .badge-fuel {
            background-color: #dcfce7;
            color: #16a34a;
        }
    </style>
</head>
<body style="background-color: #f8fafc;">

            <div style="display: flex; gap: 10px;">

                    &#8592; กลับสู่แดชบอร์ด
                </a>
                <a href="#" id="logoutBtn" class="btn btn-danger">

        <div class="order-title">

        <!-- Tabs -->

    <!-- Tab Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.order-tab');
            const contents = document.querySelectorAll('.tab-content');
            
            // ฟังก์ชันสลับแท็บ
            function switchTab(targetId) {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                
                const targetTab = document.querySelector(`.order-tab[data-target="${targetId}"]`);
                if (targetTab) {
                    targetTab.classList.add('active');
                    document.getElementById(targetId).classList.add('active');
                }
            }

            // จัดการ Event Click ของแต่ละแท็บ
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetId = tab.getAttribute('data-target');
                    switchTab(targetId);
                });
            });

            // ตรวจสอบ URL Parameter หรือ LocalStorage เพื่อเปิดแท็บที่ถูกต้องตอนโหลดหน้า
            const urlParams = new URLSearchParams(window.location.search);
            let tabParam = urlParams.get('tab');
            
            // ถ้าไม่มีใน URL ให้ลองดึงจาก localStorage (แก้ปัญหาเบราว์เซอร์ตัด URL)
            if (!tabParam) {
                const savedTab = localStorage.getItem('activeTab');
                if (savedTab) {
                    tabParam = savedTab.replace('tab-', '');
                    localStorage.removeItem('activeTab'); // ใช้เสร็จแล้วลบทิ้ง
                }
            }

            if (tabParam === 'list') {
                switchTab('tab-list');
            } else if (tabParam === 'create') {
                switchTab('tab-create');
            } else if (tabParam === 'contract') {
                switchTab('tab-contract');
            }
        });
    </script>
