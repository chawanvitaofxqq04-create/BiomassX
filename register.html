<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - BiomassX</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container" style="padding: 40px 20px;">
        <div class="auth-card" style="max-width: 550px;">
            <a href="index.html" class="auth-logo">
                <span class="logo-icon">X</span> BiomassX
            </a>
            
            <h2 class="auth-title">สมัครสมาชิกใหม่</h2>
            
            <div id="registerSuccess" style="display: none; background-color: var(--light-green); color: var(--primary-green); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; border: 1px solid var(--primary-green);">
                สมัครสมาชิกสำเร็จ! กำลังพากลับไปหน้าเข้าสู่ระบบ...
            </div>
            <div id="registerError" style="display: none; background-color: var(--alert-red-bg); color: var(--alert-red); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; border: 1px solid var(--alert-red);">
                มีข้อผิดพลาดบางอย่าง
            </div>
            
            <form id="registerForm">
                <div class="flex gap-4">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label" for="firstname">ชื่อ</label>
                        <input type="text" id="firstname" class="form-control" placeholder="ชื่อจริง" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label" for="lastname">นามสกุล</label>
                        <input type="text" id="lastname" class="form-control" placeholder="นามสกุล" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">อีเมล (Email)</label>
                    <input type="email" id="email" class="form-control" placeholder="กรอกอีเมลของคุณ" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">รหัสผ่าน (Password)</label>
                    <input type="password" id="password" class="form-control" placeholder="ตั้งรหัสผ่านอย่างน้อย 8 ตัวอักษร" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">ยืนยันรหัสผ่าน (Confirm Password)</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
                </div>
                
                <div class="auth-links" style="margin-top: 10px;">
                    <label style="display: flex; align-items: start; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted);">
                        <input type="checkbox" required style="margin-top: 3px;"> 
                        <span>ฉันยอมรับ <a href="#">เงื่อนไขการให้บริการ</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a> ของ BiomassX</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">สมัครสมาชิก</button>
            </form>
            
            <div class="auth-footer">
                มีบัญชีผู้ใช้อยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
